schema_version: 1

context:
  name: ezsheets
  version: "2026.4.28"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/${{ name }}-${{ version }}.tar.gz
  sha256: a7f6a9b1ee2dfd2eaa22945fcf0e3f927058e45bae70ece2a8dc53eeb054d161

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - pip
    - python ${{ python_min }}.*
    - setuptools
  run:
    - python >=${{ python_min }}
    - google-api-python-client
    - google-auth-httplib2
    - google-auth-oauthlib

tests:
  - python:
      imports:
        - ezsheets
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  summary: A Pythonic interface to the Google Sheets API that actually works as of August 2021.
  license: GPL-3.0-or-later
  license_file:
    - LICENSE.txt
  homepage: https://github.com/asweigart/ezsheets

extra:
  recipe-maintainers:
    - thewchan
