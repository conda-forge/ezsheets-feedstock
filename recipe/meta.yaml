{% set name = "ezsheets" %}
{% set version = "2025.11.11" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: b175bb85f9e66ef2d147271e97abab601371e36236a1fe96f22d69b284dff29a

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - pip
    - python {{ python_min }}
    - setuptools
  run:
    - python >={{ python_min }}
    - google-api-python-client
    - google-auth-httplib2
    - google-auth-oauthlib

test:
  imports:
    - ezsheets
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/asweigart/ezsheets
  summary: A Pythonic interface to the Google Sheets API that actually works as of August 2021.
  license: GPL-3.0-or-later
  license_file:
    - LICENSE.txt

extra:
  recipe-maintainers:
    - thewchan
